name: Fetch Stock Prices & History

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_full_history:
        description: 'Force full history redownload'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch stock prices
        run: node scripts/fetch-prices.js
        env:
          FORCE_FULL_HISTORY: ${{ github.event.inputs.force_full_history }}

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push